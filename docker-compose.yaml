version: '3.8'

services:
  card-transfer-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: card-transfer-backend
    ports:
      - "8081:8081"
    environment:
      - JAVA_TOOL_OPTIONS=-Dfile.encoding=UTF-8
      - SPRING_PROFILES_ACTIVE=default
      - SERVER_PORT=8081
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - card-transfer-network
    volumes:
      - backend-logs:/tmp

networks:
  card-transfer-network:
    driver: bridge

volumes:
  backend-logs:
    driver: local